<div class="page-header">
  <div>
    <h1>Notificaciones</h1>
    <p *ngIf="!isLoading">{{ unreadCount }} sin leer</p>
  </div>
  <button class="btn-text" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
    Marcar todas como leídas
  </button>
</div>

<div class="notifications-tabs">
  <button
    *ngFor="let tab of tabs"
    class="tab"
    [class.active]="activeTab === tab.key"
    (click)="setTab(tab.key)">
    {{ tab.label }}
  </button>
</div>

<div *ngIf="isLoading" class="loading-state">
  <div class="spinner"></div>
  <p>Cargando notificaciones...</p>
</div>

<div *ngIf="!isLoading" class="notifications-list">

  <div class="empty-state" *ngIf="filteredNotifications.length === 0">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    <p>Sin notificaciones en esta categoría.</p>
  </div>

  <div
    class="notification-item"
    *ngFor="let notif of filteredNotifications"
    [class.unread]="!notif.is_read"
    (click)="markAsRead(notif.id)">

    <div class="notif-icon" [ngClass]="notif.notification_type.toLowerCase()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </div>

    <div class="notif-content">
      <p class="notif-title">{{ notif.title }}</p>
      <p class="notif-message">{{ notif.message }}</p>
      <span class="notif-date">{{ notif.created_at | date:'d MMM, HH:mm' }}</span>
    </div>

    <div class="unread-dot" *ngIf="!notif.is_read"></div>
  </div>

</div>
